# azure-pipelines/templates/pr-status.yml
parameters:
  - name: pullRequestId
    type: string
    default: '$(System.PullRequest.PullRequestId)'
  - name: contextName
    type: string
  - name: state
    type: string
  - name: description
    type: string
  - name: targetUrl       # optional override
    type: string
    default: ''
  - name: genre           # optional context.genre
    type: string
    default: ''
  - name: iteration     
    type: string
    default: '$(System.PullRequest.PullRequestIteration)'
  - name: condition
    type: string
    default: succeeded()  # only run on success

steps:
# - task: PullRequestStatus@0
#   displayName: 'Update PR deployment status'
#   inputs:
#     name: '${{ parameters.contextName }}'
#     action: 'Update'
#     state: 'succeeded'
#     description: '${{ parameters.description }}'
#     useDefined: true
#     pullRequestId: ${{ parameters.pullRequestId }}
- task: Bash@3
  displayName: "Set PR status: ${{ parameters.contextName }} → ${{ parameters.state }}"
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  condition: ${{ parameters.condition }}
  inputs:
    targetType: 'inline'
    script: |
      set -euo pipefail           # stop on any error

      # ---------- derive API route ----------
      baseUrl="${SYSTEM_TEAMFOUNDATIONCOLLECTIONURI}${SYSTEM_TEAMPROJECT}"
      statusUrl="$baseUrl/_apis/git/repositories/${BUILD_REPOSITORY_ID}/pullRequests/${{ parameters.pullRequestId }}/statuses?api-version=7.1"

      # ---------- choose targetUrl ----------
      if [ -n "${{ parameters.targetUrl }}" ]; then
        targetUrl='${{ parameters.targetUrl }}'
      else
        targetUrl="${SYSTEM_TEAMFOUNDATIONCOLLECTIONURI}${SYSTEM_TEAMPROJECT}/_build/results?buildId=${BUILD_BUILDID}"
      fi

      # ---------- resolve iteration safely ----------
      # When the ADO variable System.PullRequest.PullRequestIteration is not
      # defined (e.g. webhook-triggered pipelines), the template default renders
      # as the literal string "$(System.PullRequest.PullRequestIteration)" which
      # bash would try to execute as a command substitution. Capture it as a
      # plain variable first and only use it when it's a valid integer.
      iteration_raw='${{ parameters.iteration }}'
      if [[ "$iteration_raw" =~ ^[0-9]+$ ]]; then
        iteration_arg=(--argjson iteration "$iteration_raw")
      else
        iteration_arg=()
      fi

      # ---------- build JSON payload ----------
      jqFilter='
        def context:
          if $genre != "" then {name: $name, genre: $genre}
          else {name: $name}
          end;
        {
          state: $state,
          description: $descr,
          targetUrl: ($url | select(. != "")),
          context: context
        }
        + (if $iteration != null then {iterationId: $iteration} else {} end)
      '

      payload=$(jq -n \
        --arg  state     "${{ parameters.state }}" \
        --arg  descr     "${{ parameters.description }}" \
        --arg  name      "${{ parameters.contextName }}" \
        --arg  url       "$targetUrl" \
        --arg  genre     "${{ parameters.genre }}" \
        --argjson iteration "null" \
        "${iteration_arg[@]}" \
        "$jqFilter")

      # ---------- POST (create or update) ----------
      curl --fail-with-body -sS \
           -H "Content-Type: application/json" \
           -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
           -d "$payload" \
           "$statusUrl"
