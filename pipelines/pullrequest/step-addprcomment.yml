parameters:
  - name: commentContent    # your markdown/text
    type: string
  - name: skipIfExists      # true | false
    type: boolean
  - name: commentMarker     # unique substring used to detect duplicate comments;
                            # automatically appended to the content as an HTML comment
    type: string

steps:
# - task: PullRequestComments@0
#   displayName: 'Post a pull request comment'
#   inputs:
#     content: ${{ parameters.commentContent }}
#     status: 'Active'
#     type: 'system'
#     skipIfCommentExists: ${{ parameters.skipIfExists }}
#     pullRequestId: $(System.PullRequest.PullRequestId)
#     useDefined: true
#     commentId: ${{ parameters.commentMarker }}
#   condition: and(succeeded(), ne('$(System.PullRequest.PullRequestId)', ''))
- task: Bash@3
  displayName: 'Post PR comment (skipIfExists=${{ parameters.skipIfExists }})'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  inputs:
    targetType: 'inline'
    script: |
      baseUrl="${SYSTEM_COLLECTIONURI}${SYSTEM_TEAMPROJECT}"
      threadsUrl="$baseUrl/_apis/git/repositories/${BUILD_REPOSITORY_ID}/pullRequests/${SYSTEM_PULLREQUEST_PULLREQUESTID}/threads?api-version=7.1"
      marker='${{ parameters.commentMarker }}'

      # Fetch existing threads
      threads=$(curl -sS -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" "$threadsUrl")

      # Detect existing comment by grepping the raw JSON for the marker value.
      # Note: YAML boolean parameters expand as 'True'/'False' (capital first letter),
      # so compare case-insensitively with ${skipIfExists,,} (bash lowercase expansion).
      skipIfExists='${{ parameters.skipIfExists }}'
      exists=false
      if [ "${skipIfExists,,}" = "true" ]; then
        if echo "$threads" | grep -qF "\"$marker\""; then
          exists=true
        fi
        echo "Marker '$marker' found in threads: $exists"
      fi

      if [ "$exists" = "true" ]; then
        echo "Comment with marker '$marker' already exists—skipping."
        exit 0
      fi

      # Post new thread — embed marker in thread properties so future runs can detect it.
      payload=$(jq -n --arg text "${{ parameters.commentContent }}" \
                      --arg marker "$marker" \
        '{
          comments: [{parentCommentId: 0, content: $text, commentType: 1}],
          status: "active",
          properties: {
            "fastfood-comment-marker": {
              "$type": "System.String",
              "$value": $marker
            }
          }
        }')
      echo "Posting new comment with marker: $marker"
      curl --fail-with-body -sS \
           -H "Content-Type: application/json" \
           -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
           -d "$payload" \
           "$threadsUrl"
